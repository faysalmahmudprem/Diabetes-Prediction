services:
  - type: web
    name: diabetes-prediction
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn DiabetesPrediction.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "your-app.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://your-app.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: diabetes-prediction-db
          property: connectionString

databases:
  - name: diabetes-prediction-db
    plan: free
